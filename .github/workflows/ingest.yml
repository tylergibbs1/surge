name: ingest
on:
  schedule:
    - cron: "15 * * * *"  # every hour at :15
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .
      - run: python -m surge.ingest --days 7
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          SURGE_DATA_DIR: ${{ runner.temp }}/surge-data
      - name: Upload refreshed parquet
        uses: actions/upload-artifact@v4
        with:
          name: surge-data
          path: ${{ runner.temp }}/surge-data
          retention-days: 14
